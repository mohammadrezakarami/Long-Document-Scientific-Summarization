model:
  name: Qwen/Qwen2.5-3B-Instruct
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  train_file: data/processed/train.jsonl
  validation_file: data/processed/valid.jsonl
  output_dir: models/qwen-arxiv-qlora-adapter
  report_path: reports/training_log.md
  num_train_epochs: 2
  learning_rate: 2e-4
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 4096
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: cosine
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  evaluation_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  max_train_samples:
  max_eval_samples:
  seed: 42
